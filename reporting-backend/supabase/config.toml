# Supabase Local Development & CLI Configuration
project_id = "saisoku-omnix-system"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://saisoku-omnix-system.vercel.app"]
jwt_expiry = 3600

[storage]
enabled = true
file_size_limit = "52428800"
