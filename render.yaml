services:
  - type: web
    name: saisoku-omnix-backend
    runtime: python
    rootDir: reporting-backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ADMIN_API_TOKEN
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
